apiVersion: v1       # Core API group — Pods, Services, ConfigMaps, Namespaces live here
kind: Pod            # The resource type
metadata:
  # creationTimestamp: null  # Artifact of --dry-run=client output; omit in hand-written manifests
  labels:
    run: nginx-yaml  # Label applied by `kubectl run`. Labels are key/value pairs used for
                     # selection (e.g. Services use label selectors to find their Pods)
  name: nginx-yaml   # The Pod's name — must be unique within a namespace
spec:
  containers:
    - image: nginx         # Image to pull. No tag = implicitly :latest
                           # BEST PRACTICE: always pin a version tag in prod, e.g. nginx:1.27.0
      name: nginx-yaml     # Container name within the Pod — used in `kubectl logs <pod> -c <name>`
                           # when a Pod has multiple containers
      resources: {}        # No CPU/memory requests or limits set.
                           # Requests: what K8s reserves on the node for scheduling
                           # Limits: hard cap — container is OOMKilled if it exceeds memory limit
                           # Leave empty only in dev/learning contexts

  dnsPolicy: ClusterFirst  # DNS resolution order:
                           # 1. Cluster DNS (CoreDNS) — resolves Service names like my-svc.default.svc.cluster.local
                           # 2. Upstream DNS (node's /etc/resolv.conf) — for external names
                           # Other options: Default (node DNS only), None (fully custom via dnsConfig)

  restartPolicy: Always    # Restart the container if it exits for any reason.
                           # Correct for long-running services (web servers, APIs).
                           # Use OnFailure for Jobs, Never when you want exactly one run.

# status: {}  # Populated by the control plane at runtime. Empty in submitted manifests.
